# Phase 1, default difficulty: longer sequences, more pointers, at greater
# lookback distances than phase1_easy.yaml. Use this once the easy regime is
# confirmed solvable (configs/phase1_easy.yaml), as the actual zoo-comparison
# workhorse config (referenced by zoo_starting_six.yaml).
#
# Verified empirically on this repo's target hardware (single RTX 5060 Ti,
# 16GB): standard attention reaches ~99% recall accuracy within these
# settings in ~95s. An earlier, harder attempt at this difficulty tier
# (n_features=32, seq_len=128, n_pointers=12) did not converge within 2500
# steps and was also ~15x slower per step due to this repo's Python-loop
# batch generator (recall_task.py) scaling with batch_size * seq_len *
# n_pointers -- if you push difficulty past this config, budget real time
# for both retuning and for the slower data generation, and re-verify
# recall_metrics.accuracy actually converges before trusting a comparison.
#
#   uv run szoo train --config configs/phase1_default.yaml --device cuda

name: phase1_default
features:
  n_features: 24
  sparsity: 0.5
recall_task:
  seq_len: 64
  n_pointers: 6
  min_gap: 3
model:
  d_model: 64
  mixing_primitive_name: standard_attention
  n_layers: 1
  mixing_kwargs:
    n_heads: 4
train:
  steps: 3000
  batch_size: 64
  lr: 0.003
  seed: 0
retrieval_threshold: 0.05
