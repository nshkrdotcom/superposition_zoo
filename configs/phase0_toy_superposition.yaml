# Phase 0: reproduce Elhage et al. (2022) "Toy Models of Superposition"
# exactly -- no sequence structure, no mixing primitive. Run this first,
# before anything else in this repo, to confirm the known phase-transition
# / feature-packing phenomena reproduce here.
#
#   uv run szoo phase0 --config configs/phase0_toy_superposition.yaml

name: phase0_toy_superposition
n_features: 40
d_hidden: 8
sparsity: 0.9
steps: 3000
batch_size: 256
lr: 0.001
seed: 0
threshold: 0.05
